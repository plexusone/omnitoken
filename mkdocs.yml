site_name: OmniToken
site_description: Token management SDK bridging goauth credentials with vault-based storage
site_url: https://plexusone.github.io/omnitoken
repo_url: https://github.com/plexusone/omnitoken
repo_name: plexusone/omnitoken

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Credential Sources: credential-sources.md
  - API Reference: api.md
  - MCP Integration: mcp-integration.md
  - Examples:
      - Basic Usage: examples/basic.md
      - MCP Server: examples/mcp.md
  - Releases:
      - v0.1.0: releases/v0.1.0.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omnitoken
